site_name: nasap-fit
site_description: High-performance fitting library for NASAP reaction rate constants
site_url: https://hiraoka-group.github.io/nasap-fit/
repo_url: https://github.com/Hiraoka-Group/nasap-fit
repo_name: Hiraoka-Group/nasap-fit

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
